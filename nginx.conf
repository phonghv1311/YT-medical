# Nginx configuration for telemedicine app
# Copy to: sudo cp nginx.conf /etc/nginx/sites-available/telemedicine
# Enable:   sudo ln -sf /etc/nginx/sites-available/telemedicine /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx
#
# Replace example.com with your droplet IP or domain.

server {
    listen 80;
    server_name example.com;   # or your droplet IP, e.g. 164.92.xxx.xxx

    # React static files (Vite build output)
    root /var/www/myapp/frontend/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API and uploads → Node.js backend (run backend with PORT=3001 in production)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
